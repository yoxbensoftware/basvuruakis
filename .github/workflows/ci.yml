name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        shell: pwsh
        run: ./infrastructure/security/secret-scan.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Restore .NET
        run: dotnet restore BasvuruAkis.slnx

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Test API
        run: dotnet test BasvuruAkis.slnx --no-restore

      - name: Validate EF migrations
        run: dotnet tool run dotnet-ef migrations script --idempotent --project apps/api/BasvuruAkis.Api.csproj --startup-project apps/api/BasvuruAkis.Api.csproj --context AppDbContext --output /tmp/basvuruakis-migrations.sql

      - name: Validate production operations scripts
        shell: pwsh
        env:
          ASPNETCORE_ENVIRONMENT: Production
          Database__Provider: Postgres
          ConnectionStrings__Postgres: Host=db.example.test;Port=5432;Database=basvuruakis;Username=basvuruakis;Password=test
          Security__EncryptionKey: ci-production-config-encryption-key-32-plus
          Security__LookupKey: ci-production-config-lookup-key-32-plus
          Jwt__SigningKey: ci-production-config-jwt-key-32-plus
          AdminBootstrap__Email: admin@example.test
          AdminBootstrap__Password: CorrectHorse!42X
          AdminBootstrap__MfaSecret: JBSWY3DPEHPK3PXP
          Captcha__TurnstileSecret: ci-turnstile-secret
          Sms__Provider: http-json
          Sms__ApiKey: ci-sms-api-key
          Sms__Endpoint: https://sms.example.test/messages
          Sms__Sender: BasvuruAkis
          Sms__MessageTemplate: "Basvuru dogrulama kodunuz: {code}"
          Cors__AllowedOrigins__0: https://app.example.test
          NEXT_PUBLIC_CAPTCHA_PROVIDER: turnstile
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          NEXT_PUBLIC_API_URL: https://api.example.test
        run: |
          ./infrastructure/production/test-production-env.ps1
          ./infrastructure/production/new-production-secrets.ps1 -AdminEmail admin@example.test -OutputPath "$env:RUNNER_TEMP/generated.env" -Force
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/legal" | Out-Null
          Set-Content -Path "$env:RUNNER_TEMP/legal/privacy.txt" -Value "Onayli KVKK aydinlatma metni." -Encoding utf8NoBOM
          Set-Content -Path "$env:RUNNER_TEMP/legal/consent.txt" -Value "Onayli acik riza metni." -Encoding utf8NoBOM
          ./infrastructure/production/new-operational-seed-sql.ps1 -PrivacyNoticeFile "$env:RUNNER_TEMP/legal/privacy.txt" -ExplicitConsentFile "$env:RUNNER_TEMP/legal/consent.txt" -OutputPath "$env:RUNNER_TEMP/operational-seed.sql"
          if (-not (Test-Path "$env:RUNNER_TEMP/operational-seed.sql")) { throw "Operational seed SQL was not generated." }

      - name: Scan NuGet packages
        run: |
          dotnet list apps/api/BasvuruAkis.Api.csproj package --vulnerable --include-transitive
          dotnet list tests/api/BasvuruAkis.Api.Tests.csproj package --vulnerable --include-transitive

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --dir apps/web lint

      - name: Typecheck web
        run: pnpm --dir apps/web typecheck

      - name: Build web
        run: pnpm --dir apps/web build

      - name: Audit web dependencies
        run: pnpm audit --audit-level moderate

      - name: Validate Compose
        env:
          SECURITY_ENCRYPTION_KEY: ci-compose-config-encryption-key
          SECURITY_LOOKUP_KEY: ci-compose-config-lookup-key
          JWT_SIGNING_KEY: ci-compose-config-jwt-key
          ADMIN_BOOTSTRAP_EMAIL: admin@example.test
          ADMIN_BOOTSTRAP_PASSWORD: CorrectHorse!42X
          ADMIN_BOOTSTRAP_MFA_SECRET: JBSWY3DPEHPK3PXP
          TURNSTILE_SECRET: ci-turnstile-secret
          NEXT_PUBLIC_CAPTCHA_PROVIDER: turnstile
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          SMS_PROVIDER: http-json
          SMS_API_KEY: ci-sms-api-key
          SMS_ENDPOINT: https://sms.example.test/messages
        run: docker compose -f infrastructure/docker-compose.yml config
