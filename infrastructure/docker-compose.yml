services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: basvuruakis
      POSTGRES_USER: basvuruakis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-development-postgres-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basvuruakis -d basvuruakis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-development-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Provider: Postgres
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=basvuruakis;Username=basvuruakis;Password=${POSTGRES_PASSWORD:-development-postgres-password}
      Security__EncryptionKey: ${SECURITY_ENCRYPTION_KEY:?SECURITY_ENCRYPTION_KEY is required}
      Security__LookupKey: ${SECURITY_LOOKUP_KEY:?SECURITY_LOOKUP_KEY is required}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required}
      AdminBootstrap__Email: ${ADMIN_BOOTSTRAP_EMAIL:?ADMIN_BOOTSTRAP_EMAIL is required}
      AdminBootstrap__Password: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD is required}
      AdminBootstrap__MfaSecret: ${ADMIN_BOOTSTRAP_MFA_SECRET:?ADMIN_BOOTSTRAP_MFA_SECRET is required}
      Captcha__TurnstileSecret: ${TURNSTILE_SECRET:?TURNSTILE_SECRET is required}
      Sms__Provider: ${SMS_PROVIDER:?SMS_PROVIDER is required}
      Sms__ApiKey: ${SMS_API_KEY:?SMS_API_KEY is required}
      Sms__Endpoint: ${SMS_ENDPOINT:?SMS_ENDPOINT is required}
      Sms__Sender: ${SMS_SENDER:-BasvuruAkis}
      Sms__MessageTemplate: "${SMS_MESSAGE_TEMPLATE:-Basvuru dogrulama kodunuz: {code}}"
      Cors__AllowedOrigins__0: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_CAPTCHA_PROVIDER: ${NEXT_PUBLIC_CAPTCHA_PROVIDER:?NEXT_PUBLIC_CAPTCHA_PROVIDER is required}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_CAPTCHA_PROVIDER: ${NEXT_PUBLIC_CAPTCHA_PROVIDER:?NEXT_PUBLIC_CAPTCHA_PROVIDER is required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    ports:
      - "8080:80"

volumes:
  postgres-data:
  redis-data:
  minio-data:
